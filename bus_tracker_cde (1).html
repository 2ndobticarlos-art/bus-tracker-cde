<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bus Tracker CDE</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.03em; }
    header span { font-size: 12px; opacity: 0.5; margin-left: auto; }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .app { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: white;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid #e5e5e5;
    }
    .sidebar-header h2 { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.07em; }
    .sidebar-header p { font-size: 12px; color: #bbb; margin-top: 3px; }

    .paradas { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }

    .parada-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 8px;
      border: 1px solid #eee;
      background: white;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .parada-btn:hover { background: #f7f9ff; border-color: #c5d8f5; transform: translateX(2px); }
    .parada-btn.active { background: #eef5ff; border-color: #7aaee8; }
    .parada-btn.active .pname { color: #1a4f8a; }

    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .pname { font-size: 13px; font-weight: 600; color: #222; }
    .pdesc { font-size: 11px; color: #aaa; margin-top: 1px; }

    .sidebar-footer {
      padding: 10px 14px;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #bbb;
    }

    .map-area { flex: 1; display: flex; flex-direction: column; }

    .map-topbar {
      padding: 10px 16px;
      background: white;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .map-topbar .label { font-size: 14px; font-weight: 600; color: #222; }
    .badge {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 20px;
      background: #eef5ff;
      color: #185FA5;
      border: 1px solid #b5d4f4;
    }
    .coming-soon {
      margin-left: auto;
      font-size: 11px;
      color: #bbb;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #map { flex: 1; }
  </style>
</head>
<body>

<header>
  <div class="pulse-dot"></div>
  <h1>Bus Tracker — Ciudad del Este</h1>
  <span>Proyecto escolar · en desarrollo</span>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Destinos</h2>
      <p>Elegí tu parada</p>
    </div>

    <div class="paradas" id="paradas">
      <button class="parada-btn active" data-id="0">
        <span class="dot" style="background:#378ADD;"></span>
        <div><div class="pname">Centro</div><div class="pdesc">Ciudad del Este</div></div>
      </button>
      <button class="parada-btn" data-id="1">
        <span class="dot" style="background:#1D9E75;"></span>
        <div><div class="pname">Km 4</div><div class="pdesc">Ruta 7</div></div>
      </button>
      <button class="parada-btn" data-id="2">
        <span class="dot" style="background:#BA7517;"></span>
        <div><div class="pname">Km 7</div><div class="pdesc">Ruta 7</div></div>
      </button>
      <button class="parada-btn" data-id="3">
        <span class="dot" style="background:#D4537E;"></span>
        <div><div class="pname">Área 2</div><div class="pdesc">Ciudad del Este</div></div>
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="pulse-dot"></div>
      Buses en tiempo real — próximamente
    </div>
  </div>

  <div class="map-area">
    <div class="map-topbar">
      <span>📍</span>
      <span class="label" id="map-label">Centro</span>
      <span class="badge" id="map-badge">Ciudad del Este</span>
      <span class="coming-soon">🚌 buses se agregan en la próxima etapa</span>
      <button id="btn-geo" style="margin-left:auto;padding:6px 14px;background:#378ADD;color:white;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">📍 Compartir mi ubicación</button>
    </div>
    <div id="map"></div>
  </div>
</div>

<script>
  const paradas = [
    { name: "Centro",  desc: "Ciudad del Este", lat: -25.510322, lng: -54.616377, zoom: 15, color: "#378ADD" },
    { name: "Km 4",    desc: "Ruta 7",           lat: -25.507410, lng: -54.635950, zoom: 15, color: "#1D9E75" },
    { name: "Km 7",    desc: "Ruta 7",            lat: -25.497469, lng: -54.666168, zoom: 15, color: "#BA7517" },
    { name: "Área 2",  desc: "Ciudad del Este",   lat: -25.529477, lng: -54.610447, zoom: 15, color: "#D4537E" },
  ];

  const map = L.map('map').setView([paradas[0].lat, paradas[0].lng], paradas[0].zoom);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  function makeIcon(color) {
    return L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 5px rgba(0,0,0,0.4);"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
  }

  const markers = paradas.map(p =>
    L.marker([p.lat, p.lng], { icon: makeIcon(p.color) })
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br><span style="color:#888;font-size:12px;">${p.desc}</span>`)
  );

  markers[0].openPopup();

  // --- GEOLOCALIZACIÓN ---
  let miMarker = null;
  let miCircle = null;
  let watchId = null;
  const btnGeo = document.getElementById('btn-geo');

  btnGeo.addEventListener('click', () => {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
      if (miMarker) { map.removeLayer(miMarker); miMarker = null; }
      if (miCircle) { map.removeLayer(miCircle); miCircle = null; }
      btnGeo.textContent = '📍 Compartir mi ubicación';
      btnGeo.style.background = '#378ADD';
      return;
    }
    if (!navigator.geolocation) { alert('Tu navegador no soporta geolocalización.'); return; }
    btnGeo.textContent = '⏳ Obteniendo...';
    btnGeo.style.background = '#888';
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude: lat, longitude: lng, accuracy } = pos.coords;
        const iconHtml = `<div style="width:16px;height:16px;border-radius:50%;background:#378ADD;border:3px solid white;box-shadow:0 0 0 4px rgba(55,138,221,0.3);"></div>`;
        const icon = L.divIcon({ className:'', html: iconHtml, iconSize:[16,16], iconAnchor:[8,8] });
        if (miMarker) {
          miMarker.setLatLng([lat, lng]);
          miCircle.setLatLng([lat, lng]).setRadius(accuracy);
        } else {
          miMarker = L.marker([lat, lng], { icon }).addTo(map).bindPopup('<b>Tu ubicación</b>');
          miCircle = L.circle([lat, lng], { radius: accuracy, color:'#378ADD', fillColor:'#378ADD', fillOpacity:0.1, weight:1 }).addTo(map);
          map.flyTo([lat, lng], 16, { duration: 1 });
        }
        btnGeo.textContent = '🟢 Activo — tocar para detener';
        btnGeo.style.background = '#1D9E75';
      },
      (err) => {
        alert('Error: ' + err.message);
        btnGeo.textContent = '📍 Compartir mi ubicación';
        btnGeo.style.background = '#378ADD';
        watchId = null;
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );
  });

  const btns = document.querySelectorAll('.parada-btn');
  const mapLabel = document.getElementById('map-label');
  const mapBadge = document.getElementById('map-badge');

  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const p = paradas[+btn.dataset.id];
      map.flyTo([p.lat, p.lng], p.zoom, { duration: 0.9 });
      markers[+btn.dataset.id].openPopup();
      mapLabel.textContent = p.name;
      mapBadge.textContent = p.desc;
    });
  });
</script>

</body>
</html>
